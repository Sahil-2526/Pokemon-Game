<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingull's Catch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <header>
            <h1>Catch the Pokeball!</h1>
            <div class="stats">
                <span id="levelDisplay">Level: 1</span>
                <span id="scoreDisplay">Score: 0</span>
                <span id="livesDisplay">Lives: 3</span>
                <span id="timeDisplay">Time: 15s</span>
            </div>
            <div id="dashContainer"><div id="dashBar"></div></div>
        </header>

        <div id="startScreen" class="screen">
            <h2>Challenge</h2>
            <p style="margin-top: 10px; text-align: left;">
                WASD / Arrows: Move <br>
                Spacebar: Dash <br>
                Red Orbs: Damage! <br>
                Blue Orbs: Boost Refill! <br>
            </p>
            <button class="action-btn" onclick="startGame()">Try</button>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <h2>Game Over!</h2>
            <h1 id="finalScore">0</h1>
            <p id="deathReason">You ran out of lives.</p>
            <div style="margin-top: 20px;">
                <button class="action-btn" onclick="startGame()">Retry</button>
                <button class="action-btn btn-orange" id="highScoreBtn">Highest Score: 0</button>
            </div>
        </div>
    </div>

    <div id="player" class="hidden"></div>
    <div id="target" class="hidden"></div>
    <div id="entitiesContainer"></div>

    <script src="script.js"></script>
</body>
</html>
